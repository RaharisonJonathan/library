# Configuration SonarQube pour le projet BiblioTech
sonar.projectKey=bibliotech-quality-project
sonar.projectName=BiblioTech - Library Management
sonar.projectVersion=1.0.0

# Emplacement des sources
sonar.sources=server.js,src
sonar.tests=src/tests

# Chemins d'exclusions
sonar.exclusions=node_modules/**,logs/**,library.db,*.jmx
sonar.test.inclusions=src/tests/**/*.test.js,src/tests/**/*.spec.js

# Encodage des fichiers sources
sonar.sourceEncoding=UTF-8

# Paramètres JavaScript et Node.js
sonar.javascript.environments=node,express
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.globals=jest,describe,it,expect,beforeAll,afterAll
